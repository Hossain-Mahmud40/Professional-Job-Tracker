<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker</title>

    <!-- Tailwind + DaisyUI -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Inter", sans-serif;
      }

      /* Card entrance animation */
      .card-enter {
        animation: cardSlideIn 0.35s ease-out both;
      }
      @keyframes cardSlideIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Card exit animation */
      .card-exit {
        animation: cardFadeOut 0.3s ease-in both;
      }
      @keyframes cardFadeOut {
        to {
          opacity: 0;
          transform: scale(0.95) translateY(-8px);
        }
      }

      /* Input error shake */
      .input-error-shake {
        animation: shake 0.35s ease;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-4px);
        }
        75% {
          transform: translateX(4px);
        }
      }

      /* Smooth badge transitions */
      .badge-transition {
        transition:
          background-color 0.25s ease,
          color 0.25s ease;
      }

      /* Staggered card animation delay */
      .card-enter:nth-child(1) {
        animation-delay: 0s;
      }
      .card-enter:nth-child(2) {
        animation-delay: 0.05s;
      }
      .card-enter:nth-child(3) {
        animation-delay: 0.1s;
      }
      .card-enter:nth-child(4) {
        animation-delay: 0.15s;
      }
      .card-enter:nth-child(5) {
        animation-delay: 0.2s;
      }
      .card-enter:nth-child(6) {
        animation-delay: 0.25s;
      }
      .card-enter:nth-child(7) {
        animation-delay: 0.3s;
      }
      .card-enter:nth-child(8) {
        animation-delay: 0.35s;
      }
    </style>
  </head>

  <body class="min-h-screen bg-base-200 transition-colors duration-300">
    <!-- Header -->
    <header
      class="bg-base-100 border-b border-base-300 sticky top-0 z-50 shadow-sm"
    >
      <div
        class="container mx-auto px-4 sm:px-6 py-4 flex items-center justify-between"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-9 h-9 rounded-lg bg-primary flex items-center justify-center"
          >
            <i class="fa-solid fa-briefcase text-white text-sm"></i>
          </div>
          <h1 class="text-xl font-bold tracking-tight">Job Tracker</h1>
        </div>
        <div class="flex items-center gap-3">
          <button
            id="add-job-btn"
            class="btn btn-primary btn-sm gap-2"
            aria-label="Add new job"
          >
            <i class="fa-solid fa-plus text-xs"></i>
            <span class="hidden sm:inline">Add Job</span>
          </button>
          <button
            id="theme-toggle"
            class="btn btn-outline btn-sm gap-2"
            aria-label="Toggle theme"
          >
            <i id="theme-icon" class="fa-solid fa-moon"></i>
            <span id="theme-label" class="hidden sm:inline">Dark Mode</span>
          </button>
        </div>
      </div>
    </header>

    <main class="container mx-auto px-4 sm:px-6 py-6 max-w-4xl">
      <!-- Stats Cards -->
      <section
        class="grid grid-cols-3 gap-3 sm:gap-4 mb-8"
        aria-label="Job statistics"
      >
        <div
          class="bg-base-100 rounded-xl p-4 sm:p-5 shadow-sm border border-base-300 hover:shadow-md transition-shadow"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 rounded-lg bg-primary/10 hidden sm:flex items-center justify-center"
            >
              <i class="fa-solid fa-layer-group text-primary"></i>
            </div>
            <div>
              <p
                class="text-xs text-base-content/60 font-medium uppercase tracking-wide"
              >
                Total
              </p>
              <p class="text-2xl font-bold" id="total-count">0</p>
            </div>
          </div>
        </div>
        <div
          class="bg-base-100 rounded-xl p-4 sm:p-5 shadow-sm border border-base-300 hover:shadow-md transition-shadow"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 rounded-lg bg-success/10 hidden sm:flex items-center justify-center"
            >
              <i class="fa-solid fa-calendar-check text-success"></i>
            </div>
            <div>
              <p
                class="text-xs text-base-content/60 font-medium uppercase tracking-wide"
              >
                Interview
              </p>
              <p class="text-2xl font-bold text-success" id="interview-count">
                0
              </p>
            </div>
          </div>
        </div>
        <div
          class="bg-base-100 rounded-xl p-4 sm:p-5 shadow-sm border border-base-300 hover:shadow-md transition-shadow"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 rounded-lg bg-error/10 hidden sm:flex items-center justify-center"
            >
              <i class="fa-solid fa-circle-xmark text-error"></i>
            </div>
            <div>
              <p
                class="text-xs text-base-content/60 font-medium uppercase tracking-wide"
              >
                Rejected
              </p>
              <p class="text-2xl font-bold text-error" id="rejected-count">0</p>
            </div>
          </div>
        </div>
      </section>

      <!-- Filter Bar -->
      <section
        class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6"
      >
        <div class="flex items-center gap-2">
          <button id="btn-all" class="btn btn-sm btn-primary" data-filter="all">
            All
          </button>
          <button
            id="btn-interview"
            class="btn btn-sm btn-ghost"
            data-filter="interview"
          >
            <i class="fa-solid fa-calendar-check text-xs"></i> Interview
          </button>
          <button
            id="btn-rejected"
            class="btn btn-sm btn-ghost"
            data-filter="rejected"
          >
            <i class="fa-solid fa-circle-xmark text-xs"></i> Rejected
          </button>
        </div>
        <p class="text-sm text-base-content/50">
          <span id="tab-job-count">0</span> jobs
        </p>
      </section>

      <!-- Job Cards Container -->
      <section
        id="job-list"
        class="flex flex-col gap-4"
        aria-label="Job listings"
      >
        <!-- Cards rendered by JavaScript -->
      </section>

      <!-- Empty State -->
      <section id="empty-state" class="hidden py-16">
        <div class="text-center">
          <div
            class="w-20 h-20 rounded-full bg-base-300 mx-auto mb-5 flex items-center justify-center"
          >
            <i class="fa-solid fa-inbox text-3xl text-base-content/30"></i>
          </div>
          <h2 class="text-lg font-semibold mb-1">No jobs found</h2>
          <p class="text-base-content/50 text-sm">
            Try a different filter or add a new job listing.
          </p>
        </div>
      </section>
    </main>

    <!-- Add Job Modal -->
    <dialog id="add-job-modal" class="modal">
      <div class="modal-box w-full max-w-lg">
        <h3 class="text-lg font-bold mb-4">Add New Job</h3>
        <form id="add-job-form" class="flex flex-col gap-3">
          <label class="floating-label">
            <span>Company Name</span>
            <input
              type="text"
              id="input-company"
              class="input input-bordered w-full"
              placeholder="Company Name"
              required
              maxlength="100"
            />
          </label>
          <label class="floating-label">
            <span>Job Title</span>
            <input
              type="text"
              id="input-title"
              class="input input-bordered w-full"
              placeholder="Job Title"
              required
              maxlength="100"
            />
          </label>
          <label class="floating-label">
            <span>Details (location, salary, type)</span>
            <input
              type="text"
              id="input-details"
              class="input input-bordered w-full"
              placeholder="Details (location, salary, type)"
              maxlength="200"
            />
          </label>
          <label class="floating-label">
            <span>Description</span>
            <textarea
              id="input-description"
              class="textarea textarea-bordered w-full"
              placeholder="Description"
              rows="3"
              maxlength="500"
            ></textarea>
          </label>
          <div class="modal-action">
            <button type="button" class="btn btn-ghost" id="modal-cancel">
              Cancel
            </button>
            <button type="submit" class="btn btn-primary">
              <i class="fa-solid fa-plus text-xs"></i> Add Job
            </button>
          </div>
        </form>
      </div>
      <form method="dialog" class="modal-backdrop">
        <button>close</button>
      </form>
    </dialog>

    <script src="script/machine.js"></script>
  </body>
</html>
